  <text x="305" y="66" text-anchor="middle" fill="#dc2626" font-size="10">WHERE id = '' OR 1=1;--</text>

  <line x1="410" y1="45" x2="460" y2="45" stroke="#ef4444" stroke-width="1.5" marker-end="url(#bad)"/>

  <rect x="460" y="20" width="90" height="50" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="505" y="42" text-anchor="middle" fill="#991b1b" font-weight="bold">全件漏洩</text>
