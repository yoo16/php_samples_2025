  <text x="305" y="140" text-anchor="middle" fill="#166534" font-weight="bold" font-size="11">実行される SQL ✅</text>
  <text x="305" y="160" text-anchor="middle" fill="#166534" font-size="10">SELECT * FROM users</text>
  <text x="305" y="176" text-anchor="middle" fill="#166534" font-size="10">WHERE id = "'' OR 1=1;--"</text>

  <line x1="410" y1="155" x2="460" y2="155" stroke="#22c55e" stroke-width="1.5" marker-end="url(#good)"/>

  <rect x="460" y="130" width="90" height="50" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="505" y="152" text-anchor="middle" fill="#166534" font-weight="bold">0件</text>
