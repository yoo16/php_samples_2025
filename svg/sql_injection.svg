  <text x="80" y="168" text-anchor="middle" fill="#16a34a" font-size="10">'' OR 1=1;--</text>

  <line x1="150" y1="155" x2="220" y2="155" stroke="#22c55e" stroke-width="1.5" marker-end="url(#good)"/>
