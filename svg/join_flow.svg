<svg viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <!-- users -->
  <rect x="10" y="20" width="160" height="120" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="10" y="20" width="160" height="30" rx="6" fill="#3b82f6"/>
  <rect x="10" y="38" width="160" height="12" fill="#3b82f6"/>
  <text x="90" y="40" text-anchor="middle" fill="white" font-weight="bold">users</text>
  <text x="20" y="68"  fill="#1e3a5f">id = 1</text>
  <text x="20" y="86"  fill="#1e3a5f">display_name = "John"</text>
  <text x="20" y="104" fill="#1e3a5f">id = 2</text>
  <text x="20" y="122" fill="#1e3a5f">display_name = "Jane"</text>

  <!-- JOIN arrow -->
  <text x="215" y="80" text-anchor="middle" fill="#64748b" font-weight="bold">JOIN</text>
  <text x="215" y="96" text-anchor="middle" fill="#94a3b8" font-size="10">user_id</text>
  <line x1="170" y1="86" x2="195" y2="86" stroke="#64748b" stroke-width="1.5"/>
  <line x1="235" y1="86" x2="260" y2="86" stroke="#64748b" stroke-width="1.5"/>

  <!-- tweets -->
  <rect x="260" y="20" width="140" height="120" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="260" y="20" width="140" height="30" rx="6" fill="#22c55e"/>
  <rect x="260" y="38" width="140" height="12" fill="#22c55e"/>
  <text x="330" y="40" text-anchor="middle" fill="white" font-weight="bold">tweets</text>
  <text x="270" y="68"  fill="#14532d">user_id = 1</text>
  <text x="270" y="86"  fill="#14532d">message = "..."</text>
  <text x="270" y="104" fill="#14532d">user_id = 1</text>
  <text x="270" y="122" fill="#14532d">message = "..."</text>

  <!-- result -->
  <rect x="430" y="20" width="60" height="120" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <rect x="430" y="20" width="60" height="30" rx="6" fill="#ca8a04"/>
  <rect x="430" y="38" width="60" height="12" fill="#ca8a04"/>
  <text x="460" y="40" text-anchor="middle" fill="white" font-weight="bold" font-size="11">結果</text>
  <text x="435" y="68"  fill="#713f12" font-size="10">John</text>
  <text x="435" y="84"  fill="#713f12" font-size="10">tweet1</text>
  <text x="435" y="100" fill="#713f12" font-size="10">John</text>
  <text x="435" y="116" fill="#713f12" font-size="10">tweet2</text>
  <line x1="400" y1="86" x2="428" y2="86" stroke="#64748b" stroke-width="1.5" marker-end="url(#r)"/>
  <defs>
    <marker id="r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>