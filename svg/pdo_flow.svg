<svg viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="13">
  <!-- PHP -->
  <rect x="10" y="50" width="120" height="60" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="70" y="76" text-anchor="middle" fill="#0c4a6e" font-weight="bold">PHP</text>
  <text x="70" y="94" text-anchor="middle" fill="#0369a1" font-size="11">db.php</text>

  <!-- Arrow 1 -->
  <line x1="130" y1="80" x2="190" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="160" y="70" text-anchor="middle" fill="#64748b" font-size="10">new PDO()</text>

  <!-- PDO -->
  <rect x="190" y="50" width="120" height="60" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="250" y="76" text-anchor="middle" fill="#713f12" font-weight="bold">PDO</text>
  <text x="250" y="94" text-anchor="middle" fill="#92400e" font-size="11">接続オブジェクト</text>

  <!-- Arrow 2 -->
  <line x1="310" y1="80" x2="370" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="340" y="70" text-anchor="middle" fill="#64748b" font-size="10">DSN で接続</text>

  <!-- MySQL -->
  <rect x="370" y="50" width="130" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="435" y="76" text-anchor="middle" fill="#14532d" font-weight="bold">MySQL</text>
  <text x="435" y="94" text-anchor="middle" fill="#166534" font-size="11">データベース</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>